spring.application.name=StatAnalyzer

# 횖짚횖째횖쨔횖쨩횖쩐횖짼횖째횗혧 횖혩횖혬 (./db/stat_data).
spring.datasource.url=jdbc:h2:file:./db/stat_data;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=always

# === HikariCP Connection Pool ===
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true

# spring.datasource.hikari.auto-commit=false

# Prepared statement cache
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=500
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

# Spring cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=50,expireAfterAccess=30m

spring.main.headless=false

# Log
logging.level.org.zazergel.statanalyzer=${APP_LOG_LEVEL:INFO}
