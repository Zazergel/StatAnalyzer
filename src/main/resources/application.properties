spring.application.name=StatAnalyzer

# Файловая БД (./db/stat_data). Пишет на хард, а не в RAM.
spring.datasource.url=jdbc:h2:file:./db/stat_data;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=always

# === HikariCP Connection Pool ===
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# КРИТИЧНО: reWriteBatchedInserts для multi-value INSERT
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true

# УДАЛЕНО: auto-commit=false ломает REQUIRES_NEW транзакции!
# spring.datasource.hikari.auto-commit=false

# Prepared statement cache
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=500
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

# === Multipart Upload ===
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.enabled=true
server.tomcat.max-swallow-size=200MB
server.tomcat.max-http-post-size=200MB
spring.servlet.multipart.file-size-threshold=10MB

spring.main.headless=false